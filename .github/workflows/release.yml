name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    # Prevent this workflow from running on every push to main —
    # changesets/action only acts when changeset files exist or when
    # the "Version Packages" PR is merged.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Build all workspace packages before publishing.
      # Root build handles keyboard-engine + ink-cartridge main package.
      - run: npm run build
      - run: npm run build -w blots-editor

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
