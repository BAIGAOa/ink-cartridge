name: Auto-Sync Lock File

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 直接执行 npm install 同步 lock 文件 ──
      - name: Run npm install to sync lock file
        run: npm install

      # ── 检查 lock 文件是否变了 ──
      - name: Check for changes in package-lock.json
        id: check
        run: |
          if ! git diff --quiet -- package-lock.json; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "diff<<EOF" >> $GITHUB_OUTPUT
            git diff --stat -- package-lock.json >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "::notice::📦 package-lock.json 有变更，将创建 PR"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::✅ package-lock.json 无需更新"
          fi

      # ── 创建 Pull Request ──
      - name: Create Pull Request
        id: cpr
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync package-lock.json [skip ci]'
          title: '🔄 Auto-sync: package-lock.json 已自动更新'
          body: |
            ## 自动同步 Lock 文件

            `package-lock.json` 与 `package.json` 不同步，已自动执行 `npm install` 修复。

            ### 变更摘要

            ${{ steps.check.outputs.diff }}

            ### 原因

            检测到 `package.json` 变更后自动执行了 `npm install`，lock 文件已同步更新。

            > 警告: 此 PR 由 GitHub Actions 自动创建，review 确认后合并即可。
          branch: auto-sync/lockfile
          delete-branch: true
          labels: automated

      # ── 输出 PR 链接 ──
      - name: Show PR link
        if: steps.cpr.outputs.pull-request-url != ''
        run: |
          echo "::notice::🔗 PR 已创建: ${{ steps.cpr.outputs.pull-request-url }}"
